<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Name on Cup</title>
    <link rel="stylesheet" href="styles/hypertext.css" />
  </head>
  <body>
    <main class="page">
      <p class="eyebrow">Step 4</p>
      <h1>What name should we write?</h1>
      <p>
        type a name, then choose where you will enjoy your coffee. (erin, prototype prop here, would need 
        JavaScript to make this functional)
      </p>

      <section class="card">
        <form action="where.html" method="get">
          <label for="customer-name">Name for order:</label>
          <input
            id="customer-name"
            name="name"
            type="text"
            placeholder="Alex"
            maxlength="20"
          />
          <button type="submit">Continue</button>
        </form>
      </section>

      <p><a href="flavor.html">Back to flavor choices</a></p>
    </main>
  </body>
